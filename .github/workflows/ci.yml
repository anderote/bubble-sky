name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  control-plane:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: node --test control/test/*.test.mjs
      - run: find control scripts -name '*.mjs' -print0 | xargs -0 -n1 node --check

  mods:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        mod: [bubble-sky-mod, towerdefense]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
      - uses: gradle/actions/setup-gradle@v4
      - working-directory: mods/${{ matrix.mod }}
        run: ./gradlew build --console=plain
