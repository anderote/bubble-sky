name: Build play release

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
      - uses: gradle/actions/setup-gradle@v4
      - name: Build locked bundle
        env:
          BUBBLE_SKY_RELEASE: play-${{ github.sha }}
        run: node scripts/build-release.mjs dist/bubble-sky-release
      - name: Archive
        run: tar -czf bubble-sky-release.tgz -C dist/bubble-sky-release .
      - name: Publish immutable release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "play-${GITHUB_SHA}" bubble-sky-release.tgz --target "$GITHUB_SHA" --title "Bubble Sky ${GITHUB_SHA::12}" --notes "Approved play release built from main at ${GITHUB_SHA}."
